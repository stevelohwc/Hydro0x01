name: HydroponicOne CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-firmware:
    name: Build Firmware (PlatformIO)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install PlatformIO Core
      run: pip install -U platformio
      
    - name: Prepare Configuration
      working-directory: ./firmware
      run: cp include/config.example.h include/config.h

    - name: Build Firmware
      working-directory: ./firmware
      run: pio run

  check-backend:
    name: Check Backend (Fastify/Node.js)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
    - name: Install Dependencies
      working-directory: ./backend
      run: npm ci
      
    - name: Typecheck Backend
      working-directory: ./backend
      run: npx tsc --noEmit


  security-scan:
    name: Virus Scan (ClamAV / YARA)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Repository
        uses: hugoalh/scan-virus-ghaction@v0.20.1
